<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Online</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #161512; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3734; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ═══════════════════════════════════════════════════════
    //  STORAGE  (localStorage adapter — works across tabs)
    //  To enable true cross-device multiplayer, swap this out
    //  for a Firebase Realtime Database adapter.
    // ═══════════════════════════════════════════════════════
    const stor = {
      get: async (key) => {
        try {
          const val = localStorage.getItem(key);
          return val ? { key, value: val, shared: true } : null;
        } catch { return null; }
      },
      set: async (key, value) => {
        try {
          localStorage.setItem(key, value);
          // Broadcast so other tabs see the change immediately
          try { localStorage.setItem('_chess_notify', key + ':' + Date.now()); } catch {}
          return { key, value, shared: true };
        } catch { return null; }
      }
    };

    async function loadRoom(rid) {
      try {
        const r = await stor.get('chess-' + rid, true);
        return r ? JSON.parse(r.value) : null;
      } catch { return null; }
    }
    async function saveRoom(rid, s) {
      try { await stor.set('chess-' + rid, JSON.stringify(s), true); } catch {}
    }
    const genId = n => Array.from({ length: n }, () => 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.random() * 32 | 0]).join('');

    // ═══════════════════════════════════════════════════════
    //  CHESS ENGINE
    // ═══════════════════════════════════════════════════════
    const FILES = ['a','b','c','d','e','f','g','h'];
    const initBoard = () => [
      ['bR','bN','bB','bQ','bK','bB','bN','bR'],
      ['bP','bP','bP','bP','bP','bP','bP','bP'],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      ['wP','wP','wP','wP','wP','wP','wP','wP'],
      ['wR','wN','wB','wQ','wK','wB','wN','wR'],
    ];
    const cloneB = b => b.map(r => [...r]);
    const pc = p => p ? p[0] : null;

    function isAttacked(b, row, file, byCol) {
      for (let r = 0; r < 8; r++) for (let f = 0; f < 8; f++) {
        const p = b[r][f]; if (!p || pc(p) !== byCol) continue;
        const t = p[1];
        if (t === 'P') { const d = byCol === 'w' ? -1 : 1; if (r + d === row && Math.abs(f - file) === 1) return true; }
        else if (t === 'N') { const dr = Math.abs(r - row), df = Math.abs(f - file); if ((dr === 2 && df === 1) || (dr === 1 && df === 2)) return true; }
        else if (t === 'K') { if (Math.abs(r - row) <= 1 && Math.abs(f - file) <= 1) return true; }
        if (t === 'R' || t === 'Q') {
          if (r === row || f === file) {
            let ok = true;
            if (r === row) { const s = Math.sign(file - f); for (let x = f + s; x !== file; x += s) if (b[r][x]) { ok = false; break; } }
            else { const s = Math.sign(row - r); for (let x = r + s; x !== row; x += s) if (b[x][f]) { ok = false; break; } }
            if (ok) return true;
          }
        }
        if (t === 'B' || t === 'Q') {
          if (Math.abs(r - row) === Math.abs(f - file) && r !== row) {
            const sr = Math.sign(row - r), sf = Math.sign(file - f);
            let ok = true, cr = r + sr, cf = f + sf;
            while (cr !== row) { if (b[cr][cf]) { ok = false; break; } cr += sr; cf += sf; }
            if (ok) return true;
          }
        }
      }
      return false;
    }
    function kingPos(b, c) { for (let r = 0; r < 8; r++) for (let f = 0; f < 8; f++) if (b[r][f] === c + 'K') return [r, f]; return null; }
    const inCheck = (b, c) => { const kp = kingPos(b, c); return kp ? isAttacked(b, kp[0], kp[1], c === 'w' ? 'b' : 'w') : false; };

    function getMoves(b, r, f, ep, castling) {
      const p = b[r][f]; if (!p) return [];
      const c = p[0], t = p[1], mv = [];
      const add = (nr, nf) => { if (nr >= 0 && nr < 8 && nf >= 0 && nf < 8) mv.push([nr, nf]); };
      const cast = castling || { wK: true, wQ: true, bK: true, bQ: true };
      if (t === 'P') {
        const dir = c === 'w' ? -1 : 1, st = c === 'w' ? 6 : 1;
        if (r + dir >= 0 && r + dir < 8 && !b[r + dir][f]) { add(r + dir, f); if (r === st && !b[r + 2 * dir][f]) add(r + 2 * dir, f); }
        for (const df of [-1, 1]) { const nr = r + dir, nf = f + df; if (nr >= 0 && nr < 8 && nf >= 0 && nf < 8) { if (b[nr][nf] && pc(b[nr][nf]) !== c) add(nr, nf); if (ep && ep[0] === nr && ep[1] === nf) add(nr, nf); } }
      } else if (t === 'N') {
        for (const [dr, df] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) { const nr = r + dr, nf = f + df; if (nr >= 0 && nr < 8 && nf >= 0 && nf < 8 && pc(b[nr][nf]) !== c) add(nr, nf); }
      } else if (t === 'K') {
        for (let dr = -1; dr <= 1; dr++) for (let df = -1; df <= 1; df++) if (dr || df) { const nr = r + dr, nf = f + df; if (nr >= 0 && nr < 8 && nf >= 0 && nf < 8 && pc(b[nr][nf]) !== c) add(nr, nf); }
        const op = c === 'w' ? 'b' : 'w';
        if (!inCheck(b, c)) {
          const ksCast = c === 'w' ? cast.wK : cast.bK, qsCast = c === 'w' ? cast.wQ : cast.bQ;
          if (ksCast && b[r][7] === c + 'R' && !b[r][5] && !b[r][6] && !isAttacked(b, r, 5, op) && !isAttacked(b, r, 6, op)) add(r, 6);
          if (qsCast && b[r][0] === c + 'R' && !b[r][1] && !b[r][2] && !b[r][3] && !isAttacked(b, r, 3, op) && !isAttacked(b, r, 2, op)) add(r, 2);
        }
      } else {
        const dirs = [];
        if (t === 'R' || t === 'Q') dirs.push([0,1],[0,-1],[1,0],[-1,0]);
        if (t === 'B' || t === 'Q') dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
        for (const [dr, df] of dirs) { let nr = r + dr, nf = f + df; while (nr >= 0 && nr < 8 && nf >= 0 && nf < 8) { if (b[nr][nf]) { if (pc(b[nr][nf]) !== c) add(nr, nf); break; } add(nr, nf); nr += dr; nf += df; } }
      }
      return mv.filter(([nr, nf]) => {
        const nb = cloneB(b);
        if (t === 'K' && Math.abs(nf - f) === 2) { nb[r][f] = null; if (nf === 6) { nb[r][5] = nb[r][7]; nb[r][7] = null; } else { nb[r][3] = nb[r][0]; nb[r][0] = null; } nb[nr][nf] = p; }
        else { if (t === 'P' && ep && nr === ep[0] && nf === ep[1]) nb[r][nf] = null; nb[nr][nf] = p; nb[r][f] = null; }
        return !inCheck(nb, c);
      });
    }
    function anyLegal(b, c, ep, cast) { for (let r = 0; r < 8; r++) for (let f = 0; f < 8; f++) if (b[r][f] && pc(b[r][f]) === c && getMoves(b, r, f, ep, cast).length) return true; return false; }
    function getEP(hist) { if (!hist.length) return null; const l = hist[hist.length - 1]; if (l.piece[1] === 'P' && Math.abs(l.from[0] - l.to[0]) === 2) return [(l.from[0] + l.to[0]) / 2, l.to[1]]; return null; }

    function doMove(board, hist, fr, ff, tr, tf, promo, castling) {
      const p = board[fr][ff], c = p[0], t = p[1];
      const ep = getEP(hist); let cap = board[tr][tf]; const nb = cloneB(board);
      if (t === 'P' && ep && tr === ep[0] && tf === ep[1]) { cap = board[fr][tf]; nb[fr][tf] = null; }
      if (t === 'K' && Math.abs(tf - ff) === 2) { nb[fr][ff] = null; if (tf === 6) { nb[fr][5] = nb[fr][7]; nb[fr][7] = null; } else { nb[fr][3] = nb[fr][0]; nb[fr][0] = null; } nb[tr][tf] = p; }
      else { nb[tr][tf] = promo ? (c + promo) : p; nb[fr][ff] = null; }
      let san = '';
      if (t === 'K' && Math.abs(tf - ff) === 2) { san = tf > ff ? 'O-O' : 'O-O-O'; }
      else if (t === 'P') { san = (cap ? FILES[ff] + 'x' : '') + FILES[tf] + (8 - tr) + (promo ? '=' + promo : ''); }
      else { san = t + (cap ? 'x' : '') + FILES[tf] + (8 - tr); }
      let nc = { ...castling };
      if (p === 'wK') { nc.wK = false; nc.wQ = false; } if (p === 'bK') { nc.bK = false; nc.bQ = false; }
      if (fr === 7 && ff === 7) nc.wK = false; if (fr === 7 && ff === 0) nc.wQ = false;
      if (fr === 0 && ff === 7) nc.bK = false; if (fr === 0 && ff === 0) nc.bQ = false;
      const move = { piece: p, from: [fr, ff], to: [tr, tf], captured: cap, san, mover: c };
      return { board: nb, history: [...hist, move], move, castling: nc };
    }

    // ═══════════════════════════════════════════════════════
    //  URL PARAMS
    // ═══════════════════════════════════════════════════════
    function getURLParams() {
      try {
        const p = new URLSearchParams(window.location.search);
        return { room: (p.get('room') || '').toUpperCase().slice(0, 6), name: p.get('name') || '' };
      } catch { return { room: '', name: '' }; }
    }

    // ═══════════════════════════════════════════════════════
    //  CONSTANTS / THEME
    // ═══════════════════════════════════════════════════════
    const SYM = { wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟' };
    const LIGHT = '#f0d9b5', DARK = '#b58863';
    const HI = 'rgba(205,210,56,0.55)', SEL = 'rgba(20,85,30,0.5)', CHECK = 'rgba(220,30,30,0.55)';
    const fmtTime = s => { const m = Math.floor(s / 60), sc = Math.floor(s % 60); return `${m}:${sc.toString().padStart(2, '0')}`; };

    // ═══════════════════════════════════════════════════════
    //  PLAYER BAR
    // ═══════════════════════════════════════════════════════
    function PlayerBar({ color, captured, time, active, label, result }) {
      const syms = (captured || []).map(p => SYM[p]).join('');
      const tc = time < 30 ? '#ff5f5f' : active ? '#fff' : '#888';
      return (
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 12px',
          background:active ? '#312e2b' : '#1e1c19', borderRadius:7, transition:'background .3s',
          border:`1px solid ${active ? '#4a4540' : '#2a2826'}` }}>
          <div style={{ width:36, height:36, borderRadius:'50%',
            background:color==='w' ? 'linear-gradient(135deg,#f5f0e8,#d4b483)' : 'linear-gradient(135deg,#3a3632,#1a1816)',
            border:`2px solid ${color==='w' ? '#c8a96a' : '#4a4540'}`,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0,
            boxShadow:'0 2px 6px rgba(0,0,0,0.4)' }}>
            {color === 'w' ? '♔' : '♚'}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ color:'#e8e6e3', fontWeight:600, fontSize:13, display:'flex', alignItems:'center', gap:6, fontFamily:"'Georgia',serif" }}>
              {label || (color === 'w' ? 'White' : 'Black')}
            </div>
            <div style={{ fontSize:12, color:'#666', minHeight:15, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', letterSpacing:'0.5px' }}>
              {syms || <span style={{ color:'#444' }}>—</span>}
            </div>
          </div>
          {result ? (
            <div style={{ fontSize:13, fontWeight:700, padding:'3px 10px', borderRadius:5,
              background:result==='win' ? 'rgba(129,182,76,0.15)' : result==='draw' ? 'rgba(240,192,64,0.15)' : 'rgba(232,98,74,0.15)',
              color:result==='win' ? '#81b64c' : result==='draw' ? '#f0c040' : '#e8624a',
              border:`1px solid ${result==='win' ? 'rgba(129,182,76,0.3)' : result==='draw' ? 'rgba(240,192,64,0.3)' : 'rgba(232,98,74,0.3)'}` }}>
              {result === 'win' ? 'Won' : result === 'draw' ? 'Draw' : 'Lost'}
            </div>
          ) : (
            <div style={{ background:'#141210', border:`2px solid ${active ? '#81b64c' : '#2a2826'}`,
              borderRadius:6, padding:'4px 10px', fontSize:16, fontWeight:700, color:tc,
              minWidth:60, textAlign:'center', fontVariantNumeric:'tabular-nums',
              transition:'all .3s', fontFamily:"'Georgia',monospace",
              boxShadow:active ? '0 0 10px rgba(129,182,76,0.15)' : 'none' }}>
              {fmtTime(time)}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  MOVE LIST
    // ═══════════════════════════════════════════════════════
    function MoveList({ history }) {
      const ref = useRef(null);
      useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [history]);
      const pairs = [];
      for (let i = 0; i < history.length; i += 2) pairs.push([history[i], history[i + 1]]);
      return (
        <div ref={ref} style={{ flex:1, overflowY:'auto', padding:'4px 0', scrollbarWidth:'thin', scrollbarColor:'#3a3734 transparent' }}>
          {!pairs.length && <div style={{ color:'#444', textAlign:'center', padding:24, fontSize:12, letterSpacing:'0.5px', fontFamily:"'Georgia',serif", fontStyle:'italic' }}>Game starts here</div>}
          {pairs.map(([w, b], i) => (
            <div key={i} style={{ display:'flex', alignItems:'center',
              background:i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.025)',
              borderRadius:3, transition:'background .1s' }}>
              <span style={{ color:'#444', fontSize:11, width:28, textAlign:'right', paddingRight:6, flexShrink:0, fontVariantNumeric:'tabular-nums' }}>{i + 1}.</span>
              <span style={{ flex:1, padding:'4px 6px', color:'#c8c4bf', fontSize:12, fontFamily:"'Georgia',serif" }}>{w?.san || ''}</span>
              <span style={{ flex:1, padding:'4px 6px', color:'#c8c4bf', fontSize:12, fontFamily:"'Georgia',serif" }}>{b?.san || ''}</span>
            </div>
          ))}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  PROMOTION DIALOG
    // ═══════════════════════════════════════════════════════
    function PromoDialog({ color, onChoose }) {
      return (
        <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.88)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:20, borderRadius:6,
          backdropFilter:'blur(4px)' }}>
          <div style={{ background:'#1e1c19', border:'1px solid #4a4540', borderRadius:12,
            padding:'24px 28px', textAlign:'center', boxShadow:'0 20px 60px rgba(0,0,0,0.8)' }}>
            <div style={{ color:'#e8e6e3', marginBottom:16, fontWeight:600, fontSize:14,
              fontFamily:"'Georgia',serif", letterSpacing:'0.5px' }}>Promote Pawn</div>
            <div style={{ display:'flex', gap:8 }}>
              {['Q','R','B','N'].map(p => (
                <button key={p} onClick={() => onChoose(p)}
                  style={{ width:62, height:62, background:'#2a2826', border:'2px solid #4a4540',
                    borderRadius:8, cursor:'pointer', fontSize:34, display:'flex',
                    alignItems:'center', justifyContent:'center',
                    color:color === 'w' ? '#fff' : '#1a1a1a',
                    WebkitTextStroke:color === 'w' ? '1px #555' : '1px rgba(255,255,255,0.1)',
                    transition:'all .15s', filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.5))' }}
                  onMouseEnter={e => { e.currentTarget.style.background = '#4a4540'; e.currentTarget.style.transform = 'scale(1.08)'; e.currentTarget.style.borderColor = '#81b64c'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = '#2a2826'; e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.borderColor = '#4a4540'; }}>
                  {SYM[color + p]}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  BOARD
    // ═══════════════════════════════════════════════════════
    function Board({ board, myColor, selected, legalMvs, lastMove, isMyTurn, checkSq, onSquareClick }) {
      const SQ = 62;
      const rowOrder = myColor === 'b' ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
      const fileOrder = myColor === 'b' ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
      return (
        <div style={{ position:'relative', userSelect:'none' }}>
          <div style={{ position:'absolute', left:-18, top:0, height:SQ*8, display:'flex', flexDirection:'column' }}>
            {rowOrder.map(r => <div key={r} style={{ height:SQ, display:'flex', alignItems:'center', justifyContent:'center', color:'#888', fontSize:10, width:18, fontFamily:"'Georgia',serif" }}>{8 - r}</div>)}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:`repeat(8,${SQ}px)`, gridTemplateRows:`repeat(8,${SQ}px)`,
            borderRadius:5, overflow:'hidden', boxShadow:'0 12px 50px rgba(0,0,0,0.75)',
            border:'2px solid #3a3430' }}>
            {rowOrder.map(r => fileOrder.map(f => {
              const isLight = (r + f) % 2 === 0;
              const piece = board[r][f];
              const isSel = selected && selected[0] === r && selected[1] === f;
              const isLegal = legalMvs.some(([lr, lf]) => lr === r && lf === f);
              const isFrom = lastMove && lastMove.from[0] === r && lastMove.from[1] === f;
              const isTo = lastMove && lastMove.to[0] === r && lastMove.to[1] === f;
              const isCheckSq = checkSq && checkSq[0] === r && checkSq[1] === f;
              const canAct = piece && pc(piece) === myColor && isMyTurn;
              const bg = isLight ? LIGHT : DARK;
              return (
                <div key={`${r}-${f}`} onClick={() => onSquareClick(r, f)}
                  style={{ width:SQ, height:SQ, background:bg,
                    cursor:canAct || isLegal ? 'pointer' : 'default',
                    position:'relative', display:'flex', alignItems:'center', justifyContent:'center',
                    transition:'filter .08s' }}>
                  {isCheckSq && <div style={{ position:'absolute', inset:0, background:CHECK, pointerEvents:'none' }} />}
                  {(isFrom || isTo) && <div style={{ position:'absolute', inset:0, background:HI, pointerEvents:'none' }} />}
                  {isSel && <div style={{ position:'absolute', inset:0, background:SEL, pointerEvents:'none' }} />}
                  {isLegal && !piece && <div style={{ position:'absolute', width:22, height:22, borderRadius:'50%',
                    background:'rgba(0,0,0,0.22)', top:'50%', left:'50%',
                    transform:'translate(-50%,-50%)', pointerEvents:'none', zIndex:2 }} />}
                  {isLegal && piece && <div style={{ position:'absolute', inset:0, borderRadius:'50%',
                    outline:'4px solid rgba(0,0,0,0.25)', outlineOffset:'-4px',
                    pointerEvents:'none', zIndex:2 }} />}
                  {piece && <span style={{ fontSize:SQ * 0.69, lineHeight:1, zIndex:3, position:'relative',
                    color:pc(piece) === 'w' ? '#fff' : '#1a1a1a',
                    WebkitTextStroke:pc(piece) === 'w' ? '1.2px #666' : '1.2px rgba(255,255,255,0.1)',
                    filter:'drop-shadow(0 1px 4px rgba(0,0,0,0.55))',
                    cursor:canAct ? 'grab' : 'default',
                    transition:'transform .08s', pointerEvents:'none' }}>{SYM[piece]}</span>}
                </div>
              );
            }))}
          </div>
          <div style={{ display:'flex', marginTop:3 }}>
            {fileOrder.map(f => <div key={f} style={{ width:SQ, textAlign:'center', color:'#888', fontSize:10, fontFamily:"'Georgia',serif" }}>{FILES[f]}</div>)}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  GAME OVER BANNER
    // ═══════════════════════════════════════════════════════
    function GameOverBanner({ result, myColor, onNewGame }) {
      const isWin = result === myColor, isDraw = result === 'draw';
      const emoji = isWin ? '🏆' : isDraw ? '🤝' : '';
      const title = isDraw ? 'Draw!' : isWin ? 'You Won!' : 'You Lost';
      const sub = isDraw ? 'Stalemate — neither side can win' : 'By checkmate';
      return (
        <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
          background:'linear-gradient(160deg,#1e1c19,#161410)',
          border:`1px solid ${isWin ? '#81b64c' : isDraw ? '#f0c040' : '#4a4540'}`,
          borderRadius:14, padding:'28px 36px', textAlign:'center', zIndex:30,
          boxShadow:'0 24px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.03),inset 0 1px 0 rgba(255,255,255,0.05)',
          minWidth:240, backdropFilter:'blur(8px)' }}>
          <div style={{ fontSize:40, marginBottom:10, filter:'drop-shadow(0 2px 8px rgba(0,0,0,0.5))' }}>{emoji}</div>
          <div style={{ color:'#e8e6e3', fontSize:24, fontWeight:700, marginBottom:6, fontFamily:"'Georgia',serif" }}>{title}</div>
          <div style={{ color:'#666', fontSize:13, marginBottom:24, fontFamily:"'Georgia',serif", fontStyle:'italic' }}>{sub}</div>
          <button onClick={onNewGame}
            style={{ background:'linear-gradient(135deg,#81b64c,#6a9a3a)', border:'none',
              borderRadius:8, padding:'10px 28px', color:'#fff', fontSize:14, fontWeight:700,
              cursor:'pointer', transition:'all .2s', fontFamily:"'Georgia',serif",
              boxShadow:'0 4px 12px rgba(129,182,76,0.35)' }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 6px 18px rgba(129,182,76,0.45)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 4px 12px rgba(129,182,76,0.35)'; }}>
            New Game
          </button>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════════════════════
    function App() {
      const urlParams = getURLParams();
      const [screen, setScreen] = useState('home');
      const [roomId, setRoomId] = useState('');
      const [joinCode, setJoinCode] = useState(urlParams.room || '');
      const [myToken, setMyToken] = useState('');
      const [myColor, setMyColor] = useState(null);
      const [gs, setGs] = useState(null);
      const [selected, setSelected] = useState(null);
      const [legalMvs, setLegalMvs] = useState([]);
      const [promoInfo, setPromoInfo] = useState(null);
      const [error, setError] = useState('');
      const [copied, setCopied] = useState(false);
      const [wTime, setWTime] = useState(600);
      const [bTime, setBTime] = useState(600);
      const [autoJoining, setAutoJoining] = useState(false);

      const pollerRef = useRef(null);
      const timerRef = useRef(null);
      const gsRef = useRef(null);
      const myColorRef = useRef(null);
      const myTokenRef = useRef(null);
      const roomIdRef = useRef(null);
      const wRef = useRef(600);
      const bRef = useRef(600);

      useEffect(() => { gsRef.current = gs; }, [gs]);
      useEffect(() => { myColorRef.current = myColor; }, [myColor]);
      useEffect(() => { myTokenRef.current = myToken; }, [myToken]);
      useEffect(() => { roomIdRef.current = roomId; }, [roomId]);
      useEffect(() => { wRef.current = wTime; }, [wTime]);
      useEffect(() => { bRef.current = bTime; }, [bTime]);
      useEffect(() => () => { clearInterval(pollerRef.current); clearInterval(timerRef.current); }, []);

      useEffect(() => {
        if (urlParams.room && urlParams.room.length === 6) {
          setAutoJoining(true);
          autoJoin(urlParams.room);
        }
      }, []);

      async function autoJoin(code) {
        setError('');
        const state = await loadRoom(code);
        if (!state) {
          await doCreate(code);
        } else if (state.status === 'waiting' && state.black === null) {
          await doJoinExisting(code, state);
        } else if (state.status === 'playing' || state.status === 'waiting') {
          const savedTok = tryGetToken(code);
          if (savedTok) {
            const col = state.white === savedTok ? 'w' : state.black === savedTok ? 'b' : null;
            if (col) {
              setMyToken(savedTok); setMyColor(col); setRoomId(code);
              setGs(state); setScreen(state.status === 'playing' ? 'game' : 'waiting');
              startPolling(code);
              if (state.status === 'playing') startTimer();
              setAutoJoining(false);
              return;
            }
          }
          setError('This room is full or in progress.');
          setAutoJoining(false);
        } else {
          setError('Game already ended. Start a new one!');
          setAutoJoining(false);
        }
      }

      function tryGetToken(rid) { try { return sessionStorage.getItem('chess_tok_' + rid); } catch { return null; } }

      async function doCreate(rid) {
        const tok = genId(16);
        try { sessionStorage.setItem('chess_tok_' + rid, tok); } catch {}
        setMyToken(tok); setMyColor('w'); setRoomId(rid);
        const state = { white:tok, black:null, board:initBoard(), turn:'w', history:[], lastMove:null,
          capturedW:[], capturedB:[], status:'waiting', result:null,
          castling:{wK:true, wQ:true, bK:true, bQ:true}, wTime:600, bTime:600 };
        await saveRoom(rid, state);
        setGs(state); setScreen('waiting');
        startPolling(rid);
        setAutoJoining(false);
      }

      async function doJoinExisting(rid, state) {
        const tok = genId(16);
        try { sessionStorage.setItem('chess_tok_' + rid, tok); } catch {}
        setMyToken(tok); setMyColor('b'); setRoomId(rid);
        const updated = { ...state, black:tok, status:'playing' };
        await saveRoom(rid, updated);
        setGs(updated); setScreen('game');
        startPolling(rid); startTimer();
        setAutoJoining(false);
      }

      function startPolling(rid) {
        clearInterval(pollerRef.current);
        pollerRef.current = setInterval(async () => {
          const s = await loadRoom(rid); if (!s) return;
          const prev = gsRef.current;
          if (!prev || prev.history?.length !== s.history?.length || prev.status !== s.status || prev.turn !== s.turn || prev.wTime !== s.wTime || prev.bTime !== s.bTime) {
            setGs(s);
            if (s.status === 'playing' && prev?.status === 'waiting') setScreen('game');
          }
        }, 700);
      }

      function startTimer() {
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          const g = gsRef.current; if (!g || g.status !== 'playing') return;
          if (g.turn === 'w') setWTime(t => Math.max(0, t - 1));
          else setBTime(t => Math.max(0, t - 1));
        }, 1000);
      }

      useEffect(() => {
        if (gs?.status === 'playing' && !timerRef.current) startTimer();
        if (gs?.status === 'finished') { clearInterval(timerRef.current); timerRef.current = null; }
      }, [gs?.status]);

      async function createGame() {
        setError('');
        const rid = genId(6);
        await doCreate(rid);
      }

      async function joinGame() {
        setError('');
        const rid = joinCode.trim().toUpperCase();
        if (!rid) { setError('Enter a room code'); return; }
        const state = await loadRoom(rid);
        if (!state) { setError('Room not found — check the code'); return; }
        if (state.status !== 'waiting') { setError('This game is full or already ended'); return; }
        if (state.black !== null) { setError('Room is full'); return; }
        await doJoinExisting(rid, state);
      }

      async function handleSquareClick(r, f) {
        const g = gsRef.current;
        if (!g || g.status !== 'playing') return;
        const mc = myColorRef.current, mt = myTokenRef.current;
        if (g.turn !== mc) return;
        if (g[mc === 'w' ? 'white' : 'black'] !== mt) return;
        const piece = g.board[r][f];
        if (selected) {
          const [sr, sf] = selected;
          const legal = legalMvs.some(([lr, lf]) => lr === r && lf === f);
          if (legal) {
            const mp = g.board[sr][sf];
            if (mp[1] === 'P' && (r === 0 || r === 7)) { setPromoInfo({ fr:sr, ff:sf, tr:r, tf:f }); return; }
            await execMove(sr, sf, r, f, null); return;
          }
          if (piece && pc(piece) === mc) {
            const ep = getEP(g.history);
            setSelected([r, f]); setLegalMvs(getMoves(g.board, r, f, ep, g.castling)); return;
          }
          setSelected(null); setLegalMvs([]); return;
        }
        if (piece && pc(piece) === mc) {
          const ep = getEP(g.history);
          setSelected([r, f]); setLegalMvs(getMoves(g.board, r, f, ep, g.castling));
        }
      }

      async function execMove(fr, ff, tr, tf, promo) {
        const rid = roomIdRef.current;
        const state = await loadRoom(rid);
        if (!state || state.status !== 'playing') return;
        const mc = myColorRef.current, mt = myTokenRef.current;
        if (state[mc === 'w' ? 'white' : 'black'] !== mt || state.turn !== mc) return;
        const ep = getEP(state.history);
        if (!getMoves(state.board, fr, ff, ep, state.castling).some(([r, f]) => r === tr && f === tf)) return;
        const { board:nb, history:nh, move, castling:nc } = doMove(state.board, state.history, fr, ff, tr, tf, promo, state.castling);
        let cW = [...state.capturedW], cB = [...state.capturedB];
        if (move.captured) { if (pc(move.captured) === 'b') cW.push(move.captured); else cB.push(move.captured); }
        const nt = state.turn === 'w' ? 'b' : 'w', nep = getEP(nh);
        let status = 'playing', result = null;
        if (!anyLegal(nb, nt, nep, nc)) { status = 'finished'; result = inCheck(nb, nt) ? (state.turn === 'w' ? 'white' : 'black') : 'draw'; }
        const updated = { ...state, board:nb, history:nh, turn:nt,
          lastMove:{ from:[fr, ff], to:[tr, tf] }, capturedW:cW, capturedB:cB,
          status, result, castling:nc,
          wTime:mc === 'w' ? wRef.current : state.wTime,
          bTime:mc === 'b' ? bRef.current : state.bTime };
        await saveRoom(rid, updated);
        setGs(updated); setSelected(null); setLegalMvs([]); setPromoInfo(null);
      }

      async function handleResign() {
        const rid = roomIdRef.current, mc = myColorRef.current, mt = myTokenRef.current;
        const state = await loadRoom(rid); if (!state) return;
        if (state[mc === 'w' ? 'white' : 'black'] !== mt) return;
        const updated = { ...state, status:'finished', result:mc === 'w' ? 'black' : 'white' };
        await saveRoom(rid, updated); setGs(updated);
      }

      function resetAll() {
        clearInterval(pollerRef.current); clearInterval(timerRef.current);
        pollerRef.current = null; timerRef.current = null;
        setScreen('home'); setGs(null); setRoomId(''); setJoinCode('');
        setMyColor(null); setMyToken(''); setSelected(null); setLegalMvs([]);
        setPromoInfo(null); setError(''); setWTime(600); setBTime(600);
      }

      const isMyTurn = gs?.turn === myColor && gs?.status === 'playing';
      const ckColor = gs?.status === 'playing' && inCheck(gs.board, gs.turn) ? gs.turn : null;
      const ckSq = ckColor ? kingPos(gs.board, ckColor) : null;
      const opColor = myColor === 'w' ? 'b' : 'w';
      const myCapt = myColor === 'w' ? gs?.capturedW : gs?.capturedB;
      const opCapt = myColor === 'w' ? gs?.capturedB : gs?.capturedW;
      const myTime = myColor === 'w' ? wTime : bTime;
      const opTime = myColor === 'w' ? bTime : wTime;
      const myResult = gs?.result ? (gs.result === myColor ? 'win' : gs.result === 'draw' ? 'draw' : 'loss') : null;
      const opResult = gs?.result ? (gs.result === opColor ? 'win' : gs.result === 'draw' ? 'draw' : 'loss') : null;

      const BG = '#161512', PANEL = '#1e1c19', BORD = '#2e2c29';
      const baseStyle = { minHeight:'100vh', background:BG, fontFamily:"'Georgia','Times New Roman',serif",
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        padding:20, boxSizing:'border-box' };

      // ── LOADING ──
      if (autoJoining) return (
        <div style={{ ...baseStyle }}>
          <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:48, marginBottom:20, animation:'spin 2s linear infinite', display:'inline-block' }}>♟</div>
            <h2 style={{ color:'#e8e6e3', fontSize:20, fontWeight:400, margin:'0 0 8px', letterSpacing:'1px' }}>Joining game...</h2>
            <p style={{ color:'#555', margin:0, fontSize:13, fontStyle:'italic' }}>Room {urlParams.room}</p>
          </div>
        </div>
      );

      // ── HOME ──
      if (screen === 'home') return (
        <div style={{ ...baseStyle }}>
          <style>{`
            @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
            @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
            .chess-btn:hover{transform:translateY(-2px)!important}
            input::placeholder{color:#444}
          `}</style>
          <div style={{ animation:'fadeIn .5s ease', maxWidth:380, width:'100%' }}>
            <div style={{ textAlign:'center', marginBottom:40 }}>
              <div style={{ fontSize:64, marginBottom:12, display:'inline-block',
                animation:'float 3s ease-in-out infinite',
                filter:'drop-shadow(0 8px 16px rgba(0,0,0,0.6))' }}>♟</div>
              <h1 style={{ color:'#e8e6e3', fontSize:30, fontWeight:400, margin:'0 0 8px',
                letterSpacing:'2px', textTransform:'uppercase' }}>Chess Online</h1>
              <p style={{ color:'#444', margin:0, fontSize:12, letterSpacing:'1px' }}>
                NO ACCOUNT NEEDED · TWO PLAYERS · ONE CODE
              </p>
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <button className="chess-btn" onClick={createGame}
                style={{ background:'linear-gradient(135deg,#81b64c,#6a9a3a)', border:'none',
                  borderRadius:8, padding:'15px', color:'#fff', fontSize:15, fontWeight:600,
                  cursor:'pointer', transition:'all .2s', letterSpacing:'1.5px',
                  textTransform:'uppercase', boxShadow:'0 4px 16px rgba(129,182,76,0.3)',
                  fontFamily:"'Georgia',serif" }}>
                ✦ Create New Game
              </button>

              <div style={{ position:'relative', display:'flex', alignItems:'center', gap:12 }}>
                <div style={{ flex:1, height:1, background:'#2a2826' }} />
                <span style={{ color:'#444', fontSize:11, letterSpacing:'1px' }}>OR JOIN</span>
                <div style={{ flex:1, height:1, background:'#2a2826' }} />
              </div>

              <div style={{ background:PANEL, borderRadius:10, padding:16, border:`1px solid ${BORD}` }}>
                <div style={{ color:'#555', fontSize:11, marginBottom:10, letterSpacing:'1px', textTransform:'uppercase' }}>
                  Enter room code
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <input value={joinCode}
                    onChange={e => setJoinCode(e.target.value.toUpperCase().slice(0, 6))}
                    onKeyDown={e => e.key === 'Enter' && joinGame()}
                    placeholder="ABC123" maxLength={6}
                    style={{ flex:1, background:'#141210', border:`1px solid ${error ? '#e8624a' : BORD}`,
                      borderRadius:6, padding:'10px 14px', color:'#e8e6e3', fontSize:20,
                      fontWeight:700, letterSpacing:6, textTransform:'uppercase', outline:'none',
                      textAlign:'center', fontVariantNumeric:'tabular-nums',
                      transition:'border-color .2s', fontFamily:"'Georgia',monospace" }}
                    onFocus={e => e.currentTarget.style.borderColor = '#81b64c'}
                    onBlur={e => e.currentTarget.style.borderColor = error ? '#e8624a' : BORD}
                  />
                  <button className="chess-btn" onClick={joinGame}
                    style={{ background:'#2a4a7a', border:'1px solid #3a6a9a', borderRadius:6,
                      padding:'10px 18px', color:'#7ab4e8', fontSize:13, fontWeight:600,
                      cursor:'pointer', transition:'all .2s', letterSpacing:'0.5px',
                      fontFamily:"'Georgia',serif" }}>
                    Join
                  </button>
                </div>
              </div>

              {error && <div style={{ color:'#e8624a', fontSize:12, textAlign:'center',
                padding:'8px 14px', background:'rgba(232,98,74,0.08)', borderRadius:6,
                border:'1px solid rgba(232,98,74,0.2)', letterSpacing:'0.3px' }}>
                {error}
              </div>}
            </div>

            <p style={{ color:'#2e2c29', fontSize:11, marginTop:36, textAlign:'center',
              lineHeight:1.8, letterSpacing:'0.5px' }}>
              Share your 6-letter code with a friend<br />
              Open this page in another tab to play as the second player
            </p>
          </div>
        </div>
      );

      // ── WAITING ──
      if (screen === 'waiting') return (
        <div style={{ ...baseStyle }}>
          <style>{`
            @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
            @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
            @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
          `}</style>
          <div style={{ textAlign:'center', maxWidth:420, animation:'fadeIn .4s ease' }}>
            <div style={{ fontSize:44, marginBottom:16 }}>⏳</div>
            <h2 style={{ color:'#e8e6e3', margin:'0 0 6px', fontSize:22, fontWeight:400,
              letterSpacing:'2px', textTransform:'uppercase' }}>Waiting for Opponent</h2>
            <p style={{ color:'#555', margin:'0 0 28px', fontSize:12, letterSpacing:'0.5px', fontStyle:'italic' }}>
              Share the code below — your friend opens this same page and enters it
            </p>

            <div style={{ background:PANEL, border:`1px solid ${BORD}`, borderRadius:14,
              padding:'28px 36px', marginBottom:16, position:'relative',
              boxShadow:'0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.03)' }}>
              <div style={{ color:'#444', fontSize:10, marginBottom:10, textTransform:'uppercase', letterSpacing:'3px' }}>Room Code</div>
              <div style={{
                background:'linear-gradient(90deg,#81b64c,#a8d870,#81b64c)',
                backgroundSize:'200% auto',
                animation:'shimmer 3s linear infinite',
                WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                fontSize:52, fontWeight:900, letterSpacing:10,
                fontVariantNumeric:'tabular-nums', fontFamily:"'Georgia',monospace" }}>
                {roomId}
              </div>
            </div>

            <div style={{ display:'flex', gap:8, justifyContent:'center', marginBottom:20 }}>
              <button onClick={() => { navigator.clipboard?.writeText(roomId).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); }}
                style={{ background:copied ? '#1a3a1a' : '#1e1c19',
                  border:`1px solid ${copied ? '#81b64c' : BORD}`,
                  borderRadius:6, padding:'8px 18px',
                  color:copied ? '#81b64c' : '#666', fontSize:12, cursor:'pointer',
                  transition:'all .2s', letterSpacing:'0.5px', fontFamily:"'Georgia',serif" }}>
                {copied ? '✓ Copied!' : 'Copy Code'}
              </button>
            </div>

            <div style={{ color:'#555', fontSize:12, marginBottom:4, letterSpacing:'0.5px' }}>
              You are <strong style={{ color:'#f0d9b5' }}>White ♔</strong> · Waiting for Black ♚
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, justifyContent:'center', marginTop:20 }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background:'#81b64c', animation:'pulse 1.5s infinite' }} />
              <span style={{ color:'#444', fontSize:11, letterSpacing:'0.5px' }}>Polling for opponent...</span>
            </div>
            <button onClick={resetAll}
              style={{ marginTop:24, background:'transparent', border:`1px solid ${BORD}`,
                borderRadius:6, padding:'8px 18px', color:'#555', cursor:'pointer',
                fontSize:12, letterSpacing:'0.5px', fontFamily:"'Georgia',serif", transition:'all .2s' }}
              onMouseEnter={e => e.currentTarget.style.color = '#e8e6e3'}
              onMouseLeave={e => e.currentTarget.style.color = '#555'}>
              Cancel
            </button>
          </div>
        </div>
      );

      // ── GAME ──
      const turnMsg = gs?.status === 'finished'
        ? (gs.result === 'draw' ? '½ — ½  Draw' : gs.result === 'white' ? '1 — 0  White wins' : '0 — 1  Black wins')
        : gs?.status === 'playing'
          ? (gs.turn === 'w' ? '♔  White to move' : '♚  Black to move')
          : 'Starting...';

      return (
        <div style={{ minHeight:'100vh', background:BG, display:'flex', alignItems:'center',
          justifyContent:'center', fontFamily:"'Georgia','Times New Roman',serif",
          padding:16, boxSizing:'border-box' }}>
          <style>{`
            @keyframes fadeIn{from{opacity:0}to{opacity:1}}
            .resign-btn:hover{background:rgba(232,98,74,0.12)!important;color:#e8624a!important}
          `}</style>
          <div style={{ display:'flex', gap:14, alignItems:'flex-start', maxWidth:920, width:'100%',
            flexWrap:'wrap', justifyContent:'center', animation:'fadeIn .3s ease' }}>

            {/* Board column */}
            <div style={{ display:'flex', flexDirection:'column', gap:8, flexShrink:0 }}>
              <PlayerBar color={opColor} captured={opCapt || []} time={opTime}
                active={gs?.turn === opColor && gs?.status === 'playing'} label={opColor === 'w' ? 'White ♔' : 'Black ♚'}
                result={opResult} />
              <div style={{ position:'relative', marginLeft:22 }}>
                {gs && <Board board={gs.board} myColor={myColor} selected={selected}
                  legalMvs={legalMvs} lastMove={gs.lastMove} isMyTurn={isMyTurn}
                  checkSq={ckSq} onSquareClick={handleSquareClick} />}
                {promoInfo && <PromoDialog color={myColor}
                  onChoose={p => execMove(promoInfo.fr, promoInfo.ff, promoInfo.tr, promoInfo.tf, p)} />}
                {gs?.status === 'finished' && <GameOverBanner result={gs.result} myColor={myColor} onNewGame={resetAll} />}
              </div>
              <PlayerBar color={myColor} captured={myCapt || []} time={myTime}
                active={gs?.turn === myColor && gs?.status === 'playing'} label={myColor === 'w' ? 'White ♔  (You)' : 'Black ♚  (You)'}
                result={myResult} />
            </div>

            {/* Sidebar */}
            <div style={{ flex:'1', minWidth:200, maxWidth:250, background:PANEL, borderRadius:10,
              border:`1px solid ${BORD}`, display:'flex', flexDirection:'column',
              height:560, overflow:'hidden', boxShadow:'0 8px 32px rgba(0,0,0,0.4)' }}>

              <div style={{ padding:'12px 14px', borderBottom:`1px solid ${BORD}`, background:'#1a1816' }}>
                <div style={{ color:'#e8e6e3', fontWeight:600, fontSize:13, letterSpacing:'0.5px' }}>{turnMsg}</div>
                <div style={{ color:'#3a3734', fontSize:10, marginTop:3, letterSpacing:'1px' }}>
                  ROOM <span style={{ color:'#81b64c', fontWeight:700, letterSpacing:'2px' }}>{roomId}</span>
                </div>
              </div>

              <MoveList history={gs?.history || []} />

              <div style={{ padding:10, borderTop:`1px solid ${BORD}`, display:'flex', gap:8 }}>
                {gs?.status === 'playing' && (
                  <button className="resign-btn" onClick={handleResign}
                    style={{ flex:1, background:'transparent', border:'1px solid #4a2a2a',
                      borderRadius:6, padding:'8px', color:'#884040', fontSize:12,
                      cursor:'pointer', fontWeight:500, transition:'all .2s', letterSpacing:'0.5px',
                      fontFamily:"'Georgia',serif" }}>
                    Resign
                  </button>
                )}
                {gs?.status === 'finished' && (
                  <button onClick={resetAll}
                    style={{ flex:1, background:'linear-gradient(135deg,#81b64c,#6a9a3a)',
                      border:'none', borderRadius:6, padding:'8px', color:'#fff', fontSize:12,
                      cursor:'pointer', fontWeight:700, fontFamily:"'Georgia',serif", letterSpacing:'0.5px' }}>
                    New Game
                  </button>
                )}
                <button onClick={resetAll} title="Home"
                  style={{ background:'transparent', border:`1px solid ${BORD}`,
                    borderRadius:6, padding:'8px 12px', color:'#555', fontSize:14,
                    cursor:'pointer', lineHeight:1, transition:'all .2s' }}
                  onMouseEnter={e => e.currentTarget.style.color = '#e8e6e3'}
                  onMouseLeave={e => e.currentTarget.style.color = '#555'}>
                  ⌂
                </button>
              </div>

              {gs?.status === 'playing' && !isMyTurn && (
                <div style={{ padding:'8px 14px', borderTop:`1px solid ${BORD}`,
                  textAlign:'center', color:'#444', fontSize:11, fontStyle:'italic', letterSpacing:'0.3px' }}>
                  Waiting for opponent...
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
