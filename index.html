<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chess Online</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#161512;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3a3734;border-radius:3px}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .btn{cursor:pointer;transition:all .2s;font-family:inherit;border:none;outline:none}
    .btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
    .btn:active{transform:translateY(0)}
    input{font-family:inherit}input::placeholder{color:#555}input:focus{outline:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

/* ═══════════ UTILS ═══════════ */
const FILES=['a','b','c','d','e','f','g','h'];
const SYM={wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};
const LIGHT='#f0d9b5',DARK='#b58863',HI='rgba(205,210,56,0.55)',SEL_C='rgba(20,85,30,0.5)',CHK='rgba(220,30,30,0.55)';
const INIT_TIME=600000;
const fmtTime=ms=>{const s=Math.max(0,Math.ceil(ms/1000));return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`};
const pC=p=>p?p[0]:null;
const pT=p=>p?p[1]:null;
const inB=(r,c)=>r>=0&&r<8&&c>=0&&c<8;
function getUrlRoom(){try{return(new URLSearchParams(location.search).get('room')||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6)}catch{return''}}

/* ═══════════ CHESS ENGINE ═══════════ */
const initBoard=()=>[['bR','bN','bB','bQ','bK','bB','bN','bR'],['bP','bP','bP','bP','bP','bP','bP','bP'],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],[null,null,null,null,null,null,null,null],['wP','wP','wP','wP','wP','wP','wP','wP'],['wR','wN','wB','wQ','wK','wB','wN','wR']];
const cloneB=b=>b.map(r=>[...r]);

function isAtt(b,row,col,by){
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(!p||pC(p)!==by)continue;const t=pT(p);
    if(t==='P'){const d=by==='w'?-1:1;if(r+d===row&&Math.abs(c-col)===1)return true}
    if(t==='N'){const dr=Math.abs(r-row),dc=Math.abs(c-col);if((dr===2&&dc===1)||(dr===1&&dc===2))return true}
    if(t==='K'&&Math.abs(r-row)<=1&&Math.abs(c-col)<=1&&(r!==row||c!==col))return true;
    if(t==='R'||t==='Q'){if(r===row||c===col){let ok=true;if(r===row){const s=Math.sign(col-c);for(let x=c+s;x!==col;x+=s)if(b[r][x]){ok=false;break}}else{const s=Math.sign(row-r);for(let x=r+s;x!==row;x+=s)if(b[x][c]){ok=false;break}}if(ok)return true}}
    if(t==='B'||t==='Q'){if(Math.abs(r-row)===Math.abs(c-col)&&r!==row){const sr=Math.sign(row-r),sc=Math.sign(col-c);let ok=true,cr2=r+sr,cc=c+sc;while(cr2!==row){if(b[cr2][cc]){ok=false;break}cr2+=sr;cc+=sc}if(ok)return true}}
  }return false;
}

function findK(b,c){for(let r=0;r<8;r++)for(let f=0;f<8;f++)if(b[r][f]===c+'K')return[r,f];return null}
function inChk(b,c){const k=findK(b,c);return k?isAtt(b,k[0],k[1],c==='w'?'b':'w'):false}

function getEP(h){if(!h||!h.length)return null;const l=h[h.length-1];if(l.piece[1]==='P'&&Math.abs(l.from[0]-l.to[0])===2)return[(l.from[0]+l.to[0])/2,l.to[1]];return null}

function getMv(b,r,c,ep,cs){
  const p=b[r][c];if(!p)return[];const col=pC(p),t=pT(p),opp=col==='w'?'b':'w',mv=[],ca=cs||{wK:true,wQ:true,bK:true,bQ:true};
  if(t==='P'){const d=col==='w'?-1:1,st=col==='w'?6:1;if(inB(r+d,c)&&!b[r+d][c]){mv.push([r+d,c]);if(r===st&&!b[r+2*d][c])mv.push([r+2*d,c])}for(const dc of[-1,1]){const nr=r+d,nc=c+dc;if(!inB(nr,nc))continue;if(b[nr][nc]&&pC(b[nr][nc])===opp)mv.push([nr,nc]);if(ep&&ep[0]===nr&&ep[1]===nc)mv.push([nr,nc])}}
  else if(t==='N'){for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&pC(b[nr][nc])!==col)mv.push([nr,nc])}}
  else if(t==='K'){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(inB(nr,nc)&&pC(b[nr][nc])!==col)mv.push([nr,nc])}if(!inChk(b,col)){if(ca[col+'K']&&b[r][7]===col+'R'&&!b[r][5]&&!b[r][6]&&!isAtt(b,r,5,opp)&&!isAtt(b,r,6,opp))mv.push([r,6]);if(ca[col+'Q']&&b[r][0]===col+'R'&&!b[r][1]&&!b[r][2]&&!b[r][3]&&!isAtt(b,r,2,opp)&&!isAtt(b,r,3,opp))mv.push([r,2])}}
  else{const dirs=[];if(t==='R'||t==='Q')dirs.push([0,1],[0,-1],[1,0],[-1,0]);if(t==='B'||t==='Q')dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);for(const[dr,dc]of dirs){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(b[nr][nc]){if(pC(b[nr][nc])!==col)mv.push([nr,nc]);break}mv.push([nr,nc]);nr+=dr;nc+=dc}}}
  return mv.filter(([nr,nc])=>{const nb=cloneB(b);if(t==='K'&&Math.abs(nc-c)===2){nb[r][c]=null;nb[nr][nc]=p;if(nc===6){nb[r][5]=nb[r][7];nb[r][7]=null}else{nb[r][3]=nb[r][0];nb[r][0]=null}}else{if(t==='P'&&ep&&nr===ep[0]&&nc===ep[1])nb[r][nc]=null;nb[nr][nc]=p;nb[r][c]=null}return!inChk(nb,col)});
}

function hasLgl(b,col,ep,cs){for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(b[r][c]&&pC(b[r][c])===col&&getMv(b,r,c,ep,cs).length)return true;return false}

function doMv(board,hist,fr,fc,tr,tc,promo,cast){
  const p=board[fr][fc],col=pC(p),t=pT(p),ep=getEP(hist);let cap=board[tr][tc];const nb=cloneB(board);
  if(t==='P'&&ep&&tr===ep[0]&&tc===ep[1]){cap=board[fr][tc];nb[fr][tc]=null}
  if(t==='K'&&Math.abs(tc-fc)===2){nb[fr][fc]=null;nb[tr][tc]=p;if(tc===6){nb[fr][5]=nb[fr][7];nb[fr][7]=null}else{nb[fr][3]=nb[fr][0];nb[fr][0]=null}}else{nb[tr][tc]=promo?(col+promo):p;nb[fr][fc]=null}
  let san;if(t==='K'&&Math.abs(tc-fc)===2)san=tc>fc?'O-O':'O-O-O';else if(t==='P')san=(cap?FILES[fc]+'x':'')+FILES[tc]+(8-tr)+(promo?'='+promo:'');else san=t+(cap?'x':'')+FILES[tc]+(8-tr);
  const nc={...cast};if(p==='wK'){nc.wK=false;nc.wQ=false}if(p==='bK'){nc.bK=false;nc.bQ=false}
  if(fr===7&&fc===7)nc.wK=false;if(fr===7&&fc===0)nc.wQ=false;if(fr===0&&fc===7)nc.bK=false;if(fr===0&&fc===0)nc.bQ=false;
  if(tr===7&&tc===7)nc.wK=false;if(tr===7&&tc===0)nc.wQ=false;if(tr===0&&tc===7)nc.bK=false;if(tr===0&&tc===0)nc.bQ=false;
  const move={piece:p,from:[fr,fc],to:[tr,tc],captured:cap,san,mover:col};const nh=[...hist,move];const nt=col==='w'?'b':'w';const nep=getEP(nh);
  let status='playing',result=null,reason=null;
  if(inChk(nb,nt)){if(!hasLgl(nb,nt,nep,nc)){status='finished';result=col==='w'?'white':'black';reason='checkmate';move.san+='#'}else move.san+='+'}
  else if(!hasLgl(nb,nt,nep,nc)){status='finished';result='draw';reason='stalemate'}
  return{board:nb,history:nh,move,castling:nc,status,result,reason,nextTurn:nt};
}

function mkState(){return{board:initBoard(),turn:'w',history:[],captW:[],captB:[],status:'waiting',result:null,reason:null,castling:{wK:true,wQ:true,bK:true,bQ:true},wTime:INIT_TIME,bTime:INIT_TIME,lastMoveAt:null,lastMove:null}}

/* ═══════════ TIMER HOOK ═══════════ */
function useTimer(gs){
  const[t,setT]=useState({w:INIT_TIME,b:INIT_TIME});
  useEffect(()=>{if(!gs)return;const calc=()=>{if(gs.status!=='playing'||!gs.lastMoveAt)return{w:gs.wTime,b:gs.bTime};const el=Date.now()-gs.lastMoveAt;return{w:gs.turn==='w'?Math.max(0,gs.wTime-el):gs.wTime,b:gs.turn==='b'?Math.max(0,gs.bTime-el):gs.bTime}};setT(calc());if(gs.status!=='playing')return;const iv=setInterval(()=>setT(calc()),250);return()=>clearInterval(iv)},[gs?.turn,gs?.lastMoveAt,gs?.wTime,gs?.bTime,gs?.status]);
  return t;
}

/* ═══════════ UI COMPONENTS ═══════════ */

function ConnBadge({connected,opOnline,screen}){
  if(screen==='home')return null;
  return(
    <div style={{position:'fixed',top:10,right:10,display:'flex',gap:8,zIndex:50}}>
      <div style={{background:'#1e1c19',border:'1px solid #2e2c29',borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6,fontSize:11}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:connected?'#81b64c':'#e8624a',boxShadow:connected?'0 0 6px rgba(129,182,76,0.5)':'0 0 6px rgba(232,98,74,0.5)',animation:connected?'none':'blink 1s infinite'}}/>
        <span style={{color:connected?'#81b64c':'#e8624a'}}>{connected?'Connected':'Reconnecting...'}</span>
      </div>
      {screen==='game'&&(
        <div style={{background:'#1e1c19',border:'1px solid #2e2c29',borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:6,fontSize:11}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:opOnline?'#81b64c':'#666'}}/>
          <span style={{color:opOnline?'#aaa':'#666'}}>{opOnline?'Opponent online':'Opponent offline'}</span>
        </div>
      )}
    </div>
  );
}

function PlayerBar({color,captured,timeMs,active,label,result}){
  const syms=(captured||[]).map(p=>SYM[p]).join('');const low=timeMs<30000&&active;
  return(<div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:active?'#312e2b':'#1e1c19',borderRadius:8,border:`1px solid ${active?'#4a4540':'#2a2826'}`,transition:'background .3s'}}>
    <div style={{width:38,height:38,borderRadius:'50%',background:color==='w'?'linear-gradient(135deg,#f5f0e8,#d4b483)':'linear-gradient(135deg,#3a3632,#1a1816)',border:`2px solid ${color==='w'?'#c8a96a':'#4a4540'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,boxShadow:'0 2px 8px rgba(0,0,0,0.4)'}}>{color==='w'?'♔':'♚'}</div>
    <div style={{flex:1,minWidth:0}}><div style={{color:'#e8e6e3',fontWeight:600,fontSize:14}}>{label}</div><div style={{fontSize:13,color:'#666',minHeight:16,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:1}}>{syms||<span style={{color:'#444'}}>—</span>}</div></div>
    {result?(<div style={{fontSize:13,fontWeight:700,padding:'4px 12px',borderRadius:6,background:result==='win'?'rgba(129,182,76,0.15)':result==='draw'?'rgba(240,192,64,0.15)':'rgba(232,98,74,0.15)',color:result==='win'?'#81b64c':result==='draw'?'#f0c040':'#e8624a',border:`1px solid ${result==='win'?'rgba(129,182,76,0.3)':result==='draw'?'rgba(240,192,64,0.3)':'rgba(232,98,74,0.3)'}`}}>{result==='win'?'Won':result==='draw'?'Draw':'Lost'}</div>):
    (<div style={{background:'#141210',border:`2px solid ${active?low?'#ff5f5f':'#81b64c':'#2a2826'}`,borderRadius:6,padding:'5px 12px',fontSize:17,fontWeight:700,color:low?'#ff5f5f':active?'#fff':'#888',minWidth:65,textAlign:'center',fontVariantNumeric:'tabular-nums',fontFamily:'monospace',boxShadow:active?`0 0 12px ${low?'rgba(255,95,95,0.2)':'rgba(129,182,76,0.15)'}`:'none',transition:'all .3s'}}>{fmtTime(timeMs)}</div>)}
  </div>);
}

function MoveList({history}){const ref=useRef(null);useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[history]);const pairs=[];for(let i=0;i<history.length;i+=2)pairs.push([history[i],history[i+1]]);
  return(<div ref={ref} style={{flex:1,overflowY:'auto',padding:'6px 0'}}>{!pairs.length&&<div style={{color:'#444',textAlign:'center',padding:28,fontSize:13,fontStyle:'italic'}}>Moves appear here</div>}{pairs.map(([w,b],i)=>(<div key={i} style={{display:'flex',alignItems:'center',padding:'1px 0',background:i%2?'rgba(255,255,255,0.02)':'transparent',borderRadius:3}}><span style={{color:'#555',fontSize:12,width:30,textAlign:'right',paddingRight:6,flexShrink:0,fontVariantNumeric:'tabular-nums'}}>{i+1}.</span><span style={{flex:1,padding:'5px 8px',color:'#c8c4bf',fontSize:13}}>{w?.san||''}</span><span style={{flex:1,padding:'5px 8px',color:'#c8c4bf',fontSize:13}}>{b?.san||''}</span></div>))}</div>);
}

function PromoDialog({color,onChoose}){
  return(<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:20,borderRadius:6}}><div style={{background:'#1e1c19',border:'1px solid #4a4540',borderRadius:14,padding:'28px 32px',textAlign:'center',boxShadow:'0 24px 60px rgba(0,0,0,0.8)'}}><div style={{color:'#e8e6e3',marginBottom:18,fontWeight:600,fontSize:15}}>Choose Promotion</div><div style={{display:'flex',gap:10}}>{['Q','R','B','N'].map(pc=>(<button key={pc} className="btn" onClick={()=>onChoose(pc)} style={{width:66,height:66,background:'#2a2826',border:'2px solid #4a4540',borderRadius:10,fontSize:36,display:'flex',alignItems:'center',justifyContent:'center',color:color==='w'?'#fff':'#1a1a1a',WebkitTextStroke:color==='w'?'1px #555':'1px rgba(255,255,255,0.1)',filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.5))'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#81b64c'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#4a4540'}}>{SYM[color+pc]}</button>))}</div></div></div>);
}

function GameOverBanner({result,reason,myColor,onNewGame}){
  const isW=result===myColor,isD=result==='draw';
  return(<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'linear-gradient(160deg,#1e1c19,#161410)',border:`1px solid ${isW?'#81b64c':isD?'#f0c040':'#e8624a'}`,borderRadius:16,padding:'32px 40px',textAlign:'center',zIndex:30,boxShadow:'0 24px 80px rgba(0,0,0,0.9)',minWidth:260}}>
    <div style={{fontSize:44,marginBottom:12}}>{isW?'🏆':isD?'🤝':'😔'}</div>
    <div style={{color:'#e8e6e3',fontSize:26,fontWeight:700,marginBottom:8}}>{isD?'Draw!':isW?'You Won!':'You Lost'}</div>
    <div style={{color:'#666',fontSize:14,marginBottom:28,fontStyle:'italic'}}>{reason==='checkmate'?'By checkmate':reason==='stalemate'?'Stalemate':reason==='timeout'?'On time':reason==='resign'?'By resignation':'Game over'}</div>
    <button className="btn" onClick={onNewGame} style={{background:'linear-gradient(135deg,#81b64c,#6a9a3a)',borderRadius:10,padding:'12px 32px',color:'#fff',fontSize:15,fontWeight:700,boxShadow:'0 4px 16px rgba(129,182,76,0.35)'}}>New Game</button>
  </div>);
}

function Board({board,myColor,selected,legalMvs,lastMove,isMyTurn,checkSq,onClick}){
  const SQ=typeof window!=='undefined'&&window.innerWidth<520?Math.floor((window.innerWidth-80)/8):62;
  const rows=myColor==='b'?[7,6,5,4,3,2,1,0]:[0,1,2,3,4,5,6,7];
  const cols=myColor==='b'?[7,6,5,4,3,2,1,0]:[0,1,2,3,4,5,6,7];
  return(<div style={{position:'relative',userSelect:'none'}}>
    <div style={{position:'absolute',left:-20,top:0,height:SQ*8,display:'flex',flexDirection:'column'}}>{rows.map(r=><div key={r} style={{height:SQ,display:'flex',alignItems:'center',justifyContent:'center',color:'#777',fontSize:11,width:20}}>{8-r}</div>)}</div>
    <div style={{display:'grid',gridTemplateColumns:`repeat(8,${SQ}px)`,gridTemplateRows:`repeat(8,${SQ}px)`,borderRadius:4,overflow:'hidden',boxShadow:'0 12px 50px rgba(0,0,0,0.7)',border:'2px solid #3a3430'}}>
      {rows.map(r=>cols.map(f=>{const isL=(r+f)%2===0,piece=board[r][f],isSel=selected&&selected[0]===r&&selected[1]===f,isLeg=legalMvs.some(([a,b])=>a===r&&b===f),isFrom=lastMove&&lastMove.from[0]===r&&lastMove.from[1]===f,isTo=lastMove&&lastMove.to[0]===r&&lastMove.to[1]===f,isCk=checkSq&&checkSq[0]===r&&checkSq[1]===f,canAct=piece&&pC(piece)===myColor&&isMyTurn;
        return(<div key={`${r}-${f}`} onClick={()=>onClick(r,f)} style={{width:SQ,height:SQ,background:isL?LIGHT:DARK,cursor:canAct||isLeg?'pointer':'default',position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
          {isCk&&<div style={{position:'absolute',inset:0,background:CHK}}/>}
          {(isFrom||isTo)&&<div style={{position:'absolute',inset:0,background:HI}}/>}
          {isSel&&<div style={{position:'absolute',inset:0,background:SEL_C}}/>}
          {isLeg&&!piece&&<div style={{position:'absolute',width:SQ*.34,height:SQ*.34,borderRadius:'50%',background:'rgba(0,0,0,0.22)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:2}}/>}
          {isLeg&&piece&&<div style={{position:'absolute',inset:3,borderRadius:'50%',border:'3px solid rgba(0,0,0,0.25)',zIndex:2}}/>}
          {piece&&<span style={{fontSize:SQ*.7,lineHeight:1,zIndex:3,position:'relative',color:pC(piece)==='w'?'#fff':'#1a1a1a',WebkitTextStroke:pC(piece)==='w'?'1px #666':'1px rgba(255,255,255,0.08)',filter:'drop-shadow(0 1px 3px rgba(0,0,0,0.5))',pointerEvents:'none'}}>{SYM[piece]}</span>}
        </div>)}))}
    </div>
    <div style={{display:'flex',marginTop:4}}>{cols.map(f=><div key={f} style={{width:SQ,textAlign:'center',color:'#777',fontSize:11}}>{FILES[f]}</div>)}</div>
  </div>);
}

/* ═══════════ MAIN APP ═══════════ */
function App(){
  const urlRoom=useRef(getUrlRoom()).current;
  const[screen,setScreen]=useState('home');
  const[roomId,setRoomId]=useState('');
  const[joinCode,setJoinCode]=useState(urlRoom||'');
  const[myToken,setMyToken]=useState('');
  const[myColor,setMyColor]=useState(null);
  const[gs,setGs]=useState(null);
  const[selected,setSelected]=useState(null);
  const[legalMvs,setLegalMvs]=useState([]);
  const[promoInfo,setPromoInfo]=useState(null);
  const[error,setError]=useState('');
  const[copied,setCopied]=useState(false);
  const[connected,setConnected]=useState(false);
  const[opOnline,setOpOnline]=useState(false);
  const[initing,setIniting]=useState(true);

  const wsRef=useRef(null);
  const gsRef=useRef(null);
  const myColorRef=useRef(null);
  const myTokenRef=useRef(null);
  const roomIdRef=useRef(null);
  const screenRef=useRef('home');
  const reconRef=useRef(null);
  const reconN=useRef(0);
  const initTimeout=useRef(null);

  useEffect(()=>{gsRef.current=gs},[gs]);
  useEffect(()=>{myColorRef.current=myColor},[myColor]);
  useEffect(()=>{myTokenRef.current=myToken},[myToken]);
  useEffect(()=>{roomIdRef.current=roomId},[roomId]);
  useEffect(()=>{screenRef.current=screen},[screen]);

  const times=useTimer(gs);

  // Timeout detection
  useEffect(()=>{
    if(!gs||gs.status!=='playing'||gs.result!==null)return;
    if(times.w<=0){const u={...gs,status:'finished',result:'black',reason:'timeout'};setGs(u);wsSend({type:'update',roomId:roomIdRef.current,token:myTokenRef.current,state:u})}
    if(times.b<=0){const u={...gs,status:'finished',result:'white',reason:'timeout'};setGs(u);wsSend({type:'update',roomId:roomIdRef.current,token:myTokenRef.current,state:u})}
  },[times.w<=0,times.b<=0]);

  /* ── WebSocket ── */
  useEffect(()=>{
    connectWS();
    // Init timeout: if reconnect doesn't work in 4s, go to home
    const savedRoom=sessionStorage.getItem('chess_room');
    if(!savedRoom){setIniting(false)}else{
      initTimeout.current=setTimeout(()=>{setIniting(false);sessionStorage.removeItem('chess_room');sessionStorage.removeItem('chess_token')},4000);
    }
    return()=>{clearTimeout(reconRef.current);clearTimeout(initTimeout.current);if(wsRef.current)wsRef.current.onclose=null;wsRef.current?.close()};
  },[]);

  function connectWS(){
    try{
      const proto=location.protocol==='https:'?'wss:':'ws:';
      const ws=new WebSocket(proto+'//'+location.host);
      wsRef.current=ws;
      ws.onopen=()=>{
        setConnected(true);reconN.current=0;
        const r=sessionStorage.getItem('chess_room'),t=sessionStorage.getItem('chess_token');
        if(r&&t)ws.send(JSON.stringify({type:'reconnect',roomId:r,token:t}));
        else setIniting(false);
      };
      ws.onmessage=(e)=>{try{handleMsg(JSON.parse(e.data))}catch(err){console.error(err)}};
      ws.onclose=()=>{setConnected(false);const d=Math.min(2000*Math.pow(1.5,reconN.current),15000);reconRef.current=setTimeout(()=>{reconN.current++;connectWS()},d)};
      ws.onerror=()=>{};
    }catch(e){console.error('WS error',e);setIniting(false)}
  }

  function wsSend(d){if(wsRef.current?.readyState===1){wsRef.current.send(JSON.stringify(d));return true}return false}

  function handleMsg(msg){
    switch(msg.type){
      case'created':
        setRoomId(msg.roomId);setMyToken(msg.token);setMyColor(msg.color);setScreen('waiting');setGs(mkState());
        sessionStorage.setItem('chess_room',msg.roomId);sessionStorage.setItem('chess_token',msg.token);
        clearTimeout(initTimeout.current);setIniting(false);break;
      case'joined':
        setRoomId(msg.roomId);setMyToken(msg.token);setMyColor(msg.color);setGs(msg.state);setScreen('game');setOpOnline(true);
        sessionStorage.setItem('chess_room',msg.roomId);sessionStorage.setItem('chess_token',msg.token);
        clearTimeout(initTimeout.current);setIniting(false);break;
      case'started':
        setGs(msg.state);setScreen('game');setOpOnline(true);break;
      case'state':
        setGs(msg.state);setSelected(null);setLegalMvs([]);break;
      case'reconnected':
        setRoomId(msg.roomId);setMyColor(msg.color);setGs(msg.state);
        setMyToken(sessionStorage.getItem('chess_token')||'');
        setScreen(msg.state.status==='waiting'?'waiting':msg.state.status==='finished'?'game':'game');
        setOpOnline(true);clearTimeout(initTimeout.current);setIniting(false);break;
      case'opponent_connected':setOpOnline(true);break;
      case'opponent_disconnected':setOpOnline(false);break;
      case'error':
        if(msg.fatal){sessionStorage.removeItem('chess_room');sessionStorage.removeItem('chess_token');setIniting(false)}
        else{setError(msg.msg);setIniting(false)}
        break;
      case'pong':break;
    }
  }

  /* ── Game actions ── */
  function createRoom(){setError('');wsSend({type:'create',state:mkState()})}
  function joinRoom(){setError('');const c=joinCode.trim().toUpperCase();if(!c||c.length<3){setError('Enter a valid code');return}wsSend({type:'join',roomId:c})}

  function handleClick(r,f){
    const g=gsRef.current;if(!g||g.status!=='playing')return;const mc=myColorRef.current;if(g.turn!==mc)return;
    const piece=g.board[r][f];
    if(selected){const[sr,sf]=selected;const legal=legalMvs.some(([a,b])=>a===r&&b===f);
      if(legal){const mp=g.board[sr][sf];if(mp[1]==='P'&&(r===0||r===7)){setPromoInfo({fr:sr,ff:sf,tr:r,tf:f});return}doExec(sr,sf,r,f,null);return}
      if(piece&&pC(piece)===mc){const ep=getEP(g.history);setSelected([r,f]);setLegalMvs(getMv(g.board,r,f,ep,g.castling));return}
      setSelected(null);setLegalMvs([]);return;
    }
    if(piece&&pC(piece)===mc){const ep=getEP(g.history);setSelected([r,f]);setLegalMvs(getMv(g.board,r,f,ep,g.castling))}
  }

  function doExec(fr,ff,tr,tf,promo){
    const g=gsRef.current;if(!g||g.status!=='playing')return;const mc=myColorRef.current;if(g.turn!==mc)return;
    const ep=getEP(g.history);if(!getMv(g.board,fr,ff,ep,g.castling).some(([r,f])=>r===tr&&f===tf))return;
    const res=doMv(g.board,g.history,fr,ff,tr,tf,promo,g.castling);
    const now=Date.now(),elapsed=g.lastMoveAt?(now-g.lastMoveAt):0;
    let cW=[...g.captW],cB=[...g.captB];if(res.move.captured){if(pC(res.move.captured)==='b')cW.push(res.move.captured);else cB.push(res.move.captured)}
    const u={...g,board:res.board,history:res.history,turn:res.nextTurn,lastMove:{from:[fr,ff],to:[tr,tf]},captW:cW,captB:cB,status:res.status,result:res.result,reason:res.reason,castling:res.castling,wTime:mc==='w'?Math.max(0,g.wTime-elapsed):g.wTime,bTime:mc==='b'?Math.max(0,g.bTime-elapsed):g.bTime,lastMoveAt:now};
    setGs(u);setSelected(null);setLegalMvs([]);setPromoInfo(null);
    wsSend({type:'update',roomId:roomIdRef.current,token:myTokenRef.current,state:u});
  }

  function handleResign(){if(!confirm('Resign this game?'))return;const g=gsRef.current,mc=myColorRef.current;if(!g||g.status!=='playing')return;
    const u={...g,status:'finished',result:mc==='w'?'black':'white',reason:'resign'};setGs(u);
    wsSend({type:'update',roomId:roomIdRef.current,token:myTokenRef.current,state:u});
  }

  function resetAll(){
    sessionStorage.removeItem('chess_room');sessionStorage.removeItem('chess_token');
    setScreen('home');setGs(null);setRoomId('');setJoinCode('');setMyColor(null);setMyToken('');
    setSelected(null);setLegalMvs([]);setPromoInfo(null);setError('');setCopied(false);setOpOnline(false);
  }

  /* ── Derived ── */
  const isMyTurn=gs?.turn===myColor&&gs?.status==='playing';
  const ckCol=gs?.status==='playing'&&inChk(gs.board,gs.turn)?gs.turn:null;
  const ckSq=ckCol?findK(gs.board,ckCol):null;
  const opCol=myColor==='w'?'b':'w';
  const myCapt=myColor==='w'?gs?.captW:gs?.captB;
  const opCapt=myColor==='w'?gs?.captB:gs?.captW;
  const myTime=myColor==='w'?times.w:times.b;
  const opTime=myColor==='w'?times.b:times.w;
  const myRes=gs?.result?(gs.result===(myColor==='w'?'white':'black')?'win':gs.result==='draw'?'draw':'loss'):null;
  const opRes=gs?.result?(gs.result===(opCol==='w'?'white':'black')?'win':gs.result==='draw'?'draw':'loss'):null;
  const PNL='#1e1c19',BRD='#2e2c29';

  /* ── LOADING ── */
  if(initing)return(<div style={{minHeight:'100vh',background:'#161512',display:'flex',alignItems:'center',justifyContent:'center'}}>
    <ConnBadge connected={connected} opOnline={opOnline} screen="loading"/>
    <div style={{textAlign:'center',animation:'fadeIn .4s ease'}}><div style={{fontSize:52,marginBottom:20,animation:'spin 2s linear infinite',display:'inline-block'}}>♟</div>
    <h2 style={{color:'#e8e6e3',fontSize:20,fontWeight:400,letterSpacing:1}}>Reconnecting...</h2>
    <p style={{color:'#555',marginTop:8,fontSize:13}}>Restoring your game session</p>
    </div></div>);

  /* ── HOME ── */
  if(screen==='home')return(
    <div style={{minHeight:'100vh',background:'#161512',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <ConnBadge connected={connected} opOnline={opOnline} screen={screen}/>
      <div style={{animation:'fadeIn .5s ease',maxWidth:420,width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:44}}>
          <div style={{fontSize:72,marginBottom:16,display:'inline-block',animation:'float 3s ease-in-out infinite',filter:'drop-shadow(0 8px 20px rgba(0,0,0,0.6))'}}>♟</div>
          <h1 style={{color:'#e8e6e3',fontSize:32,fontWeight:300,margin:'0 0 10px',letterSpacing:3,textTransform:'uppercase'}}>Chess Online</h1>
          <p style={{color:'#555',margin:0,fontSize:13,letterSpacing:2}}>CREATE A ROOM · SHARE THE CODE · PLAY</p>
          <p style={{color:'#81b64c',margin:'8px 0 0',fontSize:12,letterSpacing:1}}>✓ Works across devices & networks</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <button className="btn" onClick={createRoom} disabled={!connected}
            style={{background:connected?'linear-gradient(135deg,#81b64c,#5a8a2a)':'#333',borderRadius:10,padding:'16px 20px',color:connected?'#fff':'#666',fontSize:16,fontWeight:600,letterSpacing:2,textTransform:'uppercase',boxShadow:connected?'0 4px 20px rgba(129,182,76,0.3)':'none',display:'flex',alignItems:'center',justifyContent:'center',gap:10,opacity:connected?1:0.6}}>
            <span style={{fontSize:22}}>♔</span> Create New Game
          </button>
          <div style={{display:'flex',alignItems:'center',gap:14,padding:'4px 0'}}><div style={{flex:1,height:1,background:'#2a2826'}}/><span style={{color:'#555',fontSize:12,letterSpacing:2}}>OR JOIN</span><div style={{flex:1,height:1,background:'#2a2826'}}/></div>
          <div style={{background:PNL,borderRadius:12,padding:20,border:`1px solid ${BRD}`,boxShadow:'0 4px 16px rgba(0,0,0,0.3)'}}>
            <div style={{color:'#888',fontSize:12,marginBottom:12,letterSpacing:2,textTransform:'uppercase',fontWeight:600}}>Enter Room Code</div>
            <div style={{display:'flex',gap:10}}>
              <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6))} onKeyDown={e=>{if(e.key==='Enter')joinRoom()}} placeholder="e.g. ABC123" maxLength={6}
                style={{flex:1,background:'#141210',border:`2px solid ${error?'#e8624a':'#333'}`,borderRadius:8,padding:'12px 16px',color:'#e8e6e3',fontSize:24,fontWeight:700,letterSpacing:8,textTransform:'uppercase',textAlign:'center',fontFamily:'monospace',transition:'border-color .2s'}} onFocus={e=>{e.currentTarget.style.borderColor='#81b64c';setError('')}} onBlur={e=>{e.currentTarget.style.borderColor=error?'#e8624a':'#333'}}/>
              <button className="btn" onClick={joinRoom} disabled={!connected}
                style={{background:connected?'linear-gradient(135deg,#2a5a9a,#1a3a6a)':'#333',borderRadius:8,padding:'12px 22px',color:connected?'#7ab4e8':'#666',fontSize:14,fontWeight:600,letterSpacing:1,border:connected?'1px solid #3a6a9a':'1px solid #333',whiteSpace:'nowrap',opacity:connected?1:0.6}}>Join →</button>
            </div>
          </div>
          {error&&<div style={{color:'#e8624a',fontSize:13,textAlign:'center',padding:'12px 16px',background:'rgba(232,98,74,0.08)',borderRadius:8,border:'1px solid rgba(232,98,74,0.2)',animation:'fadeIn .3s'}}>⚠ {error}</div>}
        </div>
        <div style={{marginTop:40,textAlign:'center',padding:'20px 16px',background:'rgba(255,255,255,0.015)',borderRadius:10,border:'1px solid #222'}}>
          <div style={{color:'#555',fontSize:13,lineHeight:2}}>
            <strong style={{color:'#81b64c'}}>How to play:</strong><br/>
            <span style={{color:'#888'}}>1.</span> Player 1 clicks <strong style={{color:'#aaa'}}>"Create New Game"</strong><br/>
            <span style={{color:'#888'}}>2.</span> Share the <strong style={{color:'#aaa'}}>6-letter code</strong> with Player 2<br/>
            <span style={{color:'#888'}}>3.</span> Player 2 enters the code → clicks <strong style={{color:'#aaa'}}>"Join"</strong><br/>
            <span style={{color:'#888'}}>4.</span> Game starts! Works on <strong style={{color:'#aaa'}}>any device</strong> 🌐
          </div>
        </div>
      </div>
    </div>
  );

  /* ── WAITING ── */
  if(screen==='waiting'){
    const link=location.origin+location.pathname+'?room='+roomId;
    return(
    <div style={{minHeight:'100vh',background:'#161512',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <ConnBadge connected={connected} opOnline={opOnline} screen={screen}/>
      <div style={{textAlign:'center',maxWidth:460,width:'100%',animation:'fadeIn .4s ease'}}>
        <div style={{fontSize:52,marginBottom:20}}>⏳</div>
        <h2 style={{color:'#e8e6e3',margin:'0 0 8px',fontSize:24,fontWeight:300,letterSpacing:2,textTransform:'uppercase'}}>Waiting for Opponent</h2>
        <p style={{color:'#666',margin:'0 0 32px',fontSize:13,lineHeight:1.8}}>Share the room code or link with your friend.<br/>They can be on <strong style={{color:'#aaa'}}>any device, anywhere</strong>.</p>

        <div style={{background:PNL,border:`1px solid ${BRD}`,borderRadius:16,padding:'32px 40px',marginBottom:20,boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}>
          <div style={{color:'#666',fontSize:11,marginBottom:14,textTransform:'uppercase',letterSpacing:4,fontWeight:600}}>Room Code</div>
          <div style={{background:'linear-gradient(90deg,#81b64c,#a8d870,#81b64c)',backgroundSize:'200% auto',animation:'shimmer 3s linear infinite',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontSize:60,fontWeight:900,letterSpacing:14,fontFamily:'monospace'}}>{roomId}</div>
        </div>

        <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap',marginBottom:24}}>
          <button className="btn" onClick={()=>{navigator.clipboard?.writeText(roomId).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500)})}}
            style={{background:copied?'#1a3a1a':PNL,border:`1px solid ${copied?'#81b64c':BRD}`,borderRadius:8,padding:'10px 20px',color:copied?'#81b64c':'#888',fontSize:13,transition:'all .2s'}}>{copied?'✓ Copied!':'📋 Copy Code'}</button>
          <button className="btn" onClick={()=>{navigator.clipboard?.writeText(link)}}
            style={{background:PNL,border:`1px solid ${BRD}`,borderRadius:8,padding:'10px 20px',color:'#888',fontSize:13}}>🔗 Copy Link</button>
        </div>

        <div style={{background:'rgba(129,182,76,0.06)',border:'1px solid rgba(129,182,76,0.15)',borderRadius:10,padding:'14px 20px',marginBottom:20}}>
          <div style={{color:'#aaa',fontSize:13,marginBottom:8}}>You are <strong style={{color:'#f0d9b5'}}>White ♔</strong></div>
          <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}><div style={{width:10,height:10,borderRadius:'50%',background:'#81b64c',animation:'pulse 1.5s infinite'}}/><span style={{color:'#81b64c',fontSize:13,fontWeight:500}}>Waiting for Black ♚ to join...</span></div>
        </div>

        <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid #222',borderRadius:8,padding:12,marginBottom:20}}>
          <div style={{color:'#444',fontSize:11,marginBottom:6}}>Share this link:</div>
          <div style={{color:'#81b64c',fontSize:12,wordBreak:'break-all',fontFamily:'monospace',lineHeight:1.6}}>{link}</div>
        </div>

        <button className="btn" onClick={resetAll} style={{background:'transparent',border:`1px solid ${BRD}`,borderRadius:8,padding:'10px 24px',color:'#666',fontSize:13}}>← Cancel</button>
      </div>
    </div>);
  }

  /* ── GAME ── */
  const turnMsg=gs?.status==='finished'?(gs.result==='draw'?'½ — ½ Draw':gs.result==='white'?'1-0 White Wins':'0-1 Black Wins'):gs?.status==='playing'?(isMyTurn?'🟢 Your Turn':'⏳ Opponent\'s Turn'):'Starting...';
  return(
    <div style={{minHeight:'100vh',background:'#161512',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <ConnBadge connected={connected} opOnline={opOnline} screen={screen}/>
      <div style={{display:'flex',gap:16,alignItems:'flex-start',maxWidth:940,width:'100%',flexWrap:'wrap',justifyContent:'center',animation:'fadeIn .3s ease'}}>
        <div style={{display:'flex',flexDirection:'column',gap:8,flexShrink:0}}>
          <PlayerBar color={opCol} captured={opCapt||[]} timeMs={opTime} active={gs?.turn===opCol&&gs?.status==='playing'} label={(opCol==='w'?'White ♔':'Black ♚')+(opOnline?'':' (offline)')} result={opRes}/>
          <div style={{position:'relative',marginLeft:24}}>
            {gs&&<Board board={gs.board} myColor={myColor} selected={selected} legalMvs={legalMvs} lastMove={gs.lastMove} isMyTurn={isMyTurn} checkSq={ckSq} onClick={handleClick}/>}
            {promoInfo&&<PromoDialog color={myColor} onChoose={p=>doExec(promoInfo.fr,promoInfo.ff,promoInfo.tr,promoInfo.tf,p)}/>}
            {gs?.status==='finished'&&<GameOverBanner result={gs.result==='white'?'w':gs.result==='black'?'b':'draw'} reason={gs.reason} myColor={myColor} onNewGame={resetAll}/>}
          </div>
          <PlayerBar color={myColor} captured={myCapt||[]} timeMs={myTime} active={gs?.turn===myColor&&gs?.status==='playing'} label={(myColor==='w'?'White ♔':'Black ♚')+' (You)'} result={myRes}/>
        </div>
        <div style={{flex:1,minWidth:210,maxWidth:260,background:PNL,borderRadius:12,border:`1px solid ${BRD}`,display:'flex',flexDirection:'column',height:565,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,0.4)'}}>
          <div style={{padding:'14px 16px',borderBottom:`1px solid ${BRD}`,background:'#1a1816'}}>
            <div style={{color:isMyTurn?'#81b64c':gs?.status==='finished'?'#f0c040':'#e8e6e3',fontWeight:600,fontSize:14}}>{turnMsg}</div>
            <div style={{color:'#444',fontSize:11,marginTop:5,letterSpacing:1}}>ROOM <span style={{color:'#81b64c',fontWeight:700,letterSpacing:3,fontFamily:'monospace',fontSize:13}}>{roomId}</span></div>
          </div>
          <MoveList history={gs?.history||[]}/>
          <div style={{padding:12,borderTop:`1px solid ${BRD}`,display:'flex',gap:8}}>
            {gs?.status==='playing'&&<button className="btn" onClick={handleResign} style={{flex:1,background:'rgba(232,98,74,0.06)',border:'1px solid #4a2a2a',borderRadius:8,padding:9,color:'#884040',fontSize:13,fontWeight:500}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(232,98,74,0.15)';e.currentTarget.style.color='#e8624a'}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(232,98,74,0.06)';e.currentTarget.style.color='#884040'}}>🏳 Resign</button>}
            {gs?.status==='finished'&&<button className="btn" onClick={resetAll} style={{flex:1,background:'linear-gradient(135deg,#81b64c,#6a9a3a)',borderRadius:8,padding:9,color:'#fff',fontSize:13,fontWeight:700}}>✦ New Game</button>}
            <button className="btn" onClick={resetAll} title="Home" style={{background:'transparent',border:`1px solid ${BRD}`,borderRadius:8,padding:'9px 14px',color:'#666',fontSize:16,lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color='#e8e6e3'} onMouseLeave={e=>e.currentTarget.style.color='#666'}>⌂</button>
          </div>
          {gs?.status==='playing'&&!isMyTurn&&<div style={{padding:'10px 16px',borderTop:`1px solid ${BRD}`,textAlign:'center',color:'#555',fontSize:12,fontStyle:'italic',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><div style={{width:6,height:6,borderRadius:'50%',background:'#f0c040',animation:'pulse 1.5s infinite'}}/>Waiting for opponent...</div>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
